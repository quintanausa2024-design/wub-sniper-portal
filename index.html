<style>
  :root{
    --bg:#06090F;--bg-2:#0A0E16;--surface:#111824;--surface-2:#151E2C;
    --line:#1F2A3A;--line-soft:#16202E;
    --text:#F4F8FD;--text-dim:#A8B6C9;--text-faint:#6D7C90;
    --fire:#FF6B2C;--fire-soft:#FF8A4C;--cyan:#34B3FF;--cyan-soft:#6FCBFF;
    --green:#27D796;--red:#FF4D5E;--amber:#FFC247;
    --display:'Space Grotesk',sans-serif;--body:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--bg);color:var(--text);font-family:var(--body);
    -webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden;position:relative;
  }
  /* ambient animated background */
  body::before{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(800px 500px at 78% -8%, rgba(255,107,44,.10), transparent 60%),
      radial-gradient(700px 500px at 12% 108%, rgba(52,179,255,.09), transparent 60%),
      radial-gradient(600px 600px at 50% 50%, rgba(52,179,255,.03), transparent 70%);
    animation:drift 16s ease-in-out infinite alternate;
  }
  /* rejilla futurista que se desplaza */
  .grid-bg{
    position:fixed;inset:-2px;z-index:0;pointer-events:none;opacity:.5;
    background-image:
      linear-gradient(rgba(52,179,255,.055) 1px,transparent 1px),
      linear-gradient(90deg,rgba(52,179,255,.055) 1px,transparent 1px);
    background-size:52px 52px;
    -webkit-mask-image:radial-gradient(circle at 50% 40%,#000 20%,transparent 78%);
    mask-image:radial-gradient(circle at 50% 40%,#000 20%,transparent 78%);
    animation:gridmove 22s linear infinite;
  }
  @keyframes gridmove{0%{background-position:0 0,0 0}100%{background-position:52px 52px,52px 52px}}
  /* barrido de escáner lento */
  .scan-bg{
    position:fixed;left:0;right:0;height:180px;z-index:0;pointer-events:none;
    background:linear-gradient(180deg,transparent,rgba(52,179,255,.05) 45%,rgba(255,107,44,.045) 55%,transparent);
    animation:scansweep 11s ease-in-out infinite;
  }
  @keyframes scansweep{0%{top:-180px;opacity:0}12%{opacity:1}88%{opacity:1}100%{top:100vh;opacity:0}}
  @media(prefers-reduced-motion:reduce){
    .grid-bg,.scan-bg,body::before{animation:none}
  }
  @keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(-20px,18px) scale(1.05)}}
  /* faint star/grid texture */
  body::after{
    content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.4;
    background-image:radial-gradient(1px 1px at 20% 30%,rgba(255,255,255,.12),transparent),
      radial-gradient(1px 1px at 60% 70%,rgba(255,255,255,.09),transparent),
      radial-gradient(1px 1px at 80% 20%,rgba(255,255,255,.10),transparent),
      radial-gradient(1px 1px at 35% 85%,rgba(255,255,255,.07),transparent),
      radial-gradient(1px 1px at 90% 60%,rgba(255,255,255,.08),transparent);
    background-size:cover;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit}
  a{color:inherit;text-decoration:none}
  .mono{font-family:var(--mono)}
  ::selection{background:rgba(255,107,44,.3)}
  @media(prefers-reduced-motion:reduce){*{animation:none !important;transition:none !important}}

  /* DEMO BAR */
  .demobar{position:fixed;top:0;left:0;right:0;height:38px;z-index:100;
    display:flex;align-items:center;justify-content:center;gap:10px;
    background:rgba(255,107,44,.10);border-bottom:1px solid rgba(255,107,44,.25);
    font-size:12px;color:var(--fire-soft);letter-spacing:.04em;backdrop-filter:blur(8px)}
  .demobar .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-left:6px}
  .demobar .seg button{padding:4px 12px;font-size:11px;color:var(--text-dim);background:var(--surface)}
  .demobar .seg button.on{background:var(--fire);color:#0A0A0A;font-weight:600}

  .app{padding-top:0;min-height:100vh;position:relative;z-index:1}

  /* ===== LOGO ORB (animated, like Lucid) ===== */
  .orb-wrap{display:flex;align-items:center;gap:14px}
  .orb{width:46px;height:46px;border-radius:50%;position:relative;flex-shrink:0;
    background:radial-gradient(circle at 35% 30%, #3A4D6B 0%, #18243A 38%, #060A12 78%);
    box-shadow:inset -6px -6px 14px rgba(0,0,0,.7), inset 4px 4px 10px rgba(120,160,220,.18);}
  .orb::before{/* glowing crescent */
    content:"";position:absolute;inset:0;border-radius:50%;
    background:radial-gradient(circle at 72% 68%, rgba(255,138,76,.0) 0%, rgba(255,107,44,.0) 40%);
    box-shadow:-3px -2px 22px 2px rgba(52,179,255,.55), 2px 3px 18px rgba(255,107,44,.35);
    animation:orbGlow 5s ease-in-out infinite alternate;}
  .orb::after{/* highlight sweep */
    content:"";position:absolute;width:12px;height:12px;border-radius:50%;top:9px;left:11px;
    background:radial-gradient(circle, rgba(180,210,255,.9), transparent 70%);filter:blur(1px)}
  @keyframes orbGlow{0%{box-shadow:-3px -2px 20px 1px rgba(52,179,255,.4), 2px 3px 14px rgba(255,107,44,.25)}
    100%{box-shadow:-4px -2px 28px 3px rgba(52,179,255,.65), 3px 4px 22px rgba(255,107,44,.45)}}
  .brand-txt .brand-name{font-family:var(--display);font-weight:700;font-size:18px;letter-spacing:.07em;line-height:1}
  .brand-txt .brand-name span{color:var(--fire)}
  .brand-txt .brand-sub{font-size:9.5px;letter-spacing:.36em;color:var(--text-faint);margin-top:4px}
  /* sniper scope reticle (login) */
  .scope{position:relative;width:150px;height:150px;display:grid;place-items:center;margin:0 auto 6px}
  .scope .ring{position:absolute;inset:0;border-radius:50%;border:1px solid rgba(255,107,44,.22)}
  .scope .ring2{position:absolute;inset:20px;border-radius:50%;border:1px dashed rgba(52,179,255,.28);animation:spin 22s linear infinite}
  .scope .ring3{position:absolute;inset:40px;border-radius:50%;border:1px solid rgba(255,107,44,.14)}
  .scope .cross{position:absolute;background:rgba(255,107,44,.45)}
  .scope .cross.t{top:0;left:50%;width:1.5px;height:18px;transform:translateX(-50%)}
  .scope .cross.b{bottom:0;left:50%;width:1.5px;height:18px;transform:translateX(-50%)}
  .scope .cross.l{left:0;top:50%;height:1.5px;width:18px;transform:translateY(-50%)}
  .scope .cross.r{right:0;top:50%;height:1.5px;width:18px;transform:translateY(-50%)}
  .scope .orb{width:62px;height:62px;z-index:2}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* scan sweep on login card */
  .login-card .scan{position:absolute;left:0;right:0;height:60px;pointer-events:none;z-index:0;
    background:linear-gradient(180deg,transparent,rgba(52,179,255,.06),transparent);animation:sweep 5s ease-in-out infinite}
  @keyframes sweep{0%{top:-60px}100%{top:100%}}

  /* LOGIN */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
  .sniper-bg{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  .candles-svg{position:absolute;left:0;right:0;bottom:0;width:100%;height:52%;opacity:.42}
  @keyframes candleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .emblem-wrap{position:absolute;top:26px;left:26px;width:120px;height:120px;opacity:.5}
  .corner-emblem{width:100%;height:100%}
  @media(max-width:720px){.emblem-wrap{width:78px;height:78px;top:16px;left:16px;opacity:.4}.candles-svg{height:42%;opacity:.3}}
  .login-col{position:relative;z-index:1}
  .login-card{width:100%;max-width:430px;background:linear-gradient(160deg,var(--surface),#0D1420);
    border:1px solid var(--line);border-radius:20px;padding:44px 36px;position:relative;overflow:hidden;
    box-shadow:0 40px 90px -30px rgba(0,0,0,.85);animation:rise .6s cubic-bezier(.2,.8,.2,1)}
  .login-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--fire),var(--cyan),transparent);
    animation:shimmer 4s linear infinite}
  @keyframes shimmer{0%{opacity:.5}50%{opacity:1}100%{opacity:.5}}
  @keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  .login-orb{display:flex;justify-content:center;margin-bottom:24px}
  .login-orb .orb{width:64px;height:64px}
  .login-h{font-family:var(--display);font-size:23px;font-weight:600;text-align:center;margin-bottom:6px}
  .login-h span{color:var(--fire)}
  .login-p{font-size:13px;color:var(--text-dim);text-align:center;margin-bottom:26px;line-height:1.55}
  .field{margin-bottom:18px}
  .field label{display:block;font-size:11px;letter-spacing:.06em;color:var(--text-dim);text-transform:uppercase;margin-bottom:8px;font-weight:600}
  .field input{width:100%;background:var(--bg-2);border:1px solid var(--line);border-radius:12px;
    padding:14px 15px;color:var(--text);font-size:14px;transition:.18s}
  .field input:focus{outline:none;border-color:var(--fire);box-shadow:0 0 0 3px rgba(255,107,44,.13)}
  .btn-primary{width:100%;padding:15px;border-radius:12px;font-weight:600;font-size:14px;
    background:linear-gradient(135deg,var(--fire),#E8551C);color:#0A0A0A;letter-spacing:.02em;
    transition:transform .12s,box-shadow .2s,filter .2s;box-shadow:0 10px 30px -10px rgba(255,107,44,.65)}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 16px 40px -10px rgba(255,107,44,.8);filter:brightness(1.05)}
  .btn-primary:active{transform:translateY(0)}
  .login-note{margin-top:20px;text-align:center;font-size:12px;color:var(--text-faint);line-height:1.6}
  .login-note a{color:var(--cyan)}
  .login-err{background:rgba(255,77,94,.1);border:1px solid rgba(255,77,94,.3);color:#FF8A95;
    font-size:12.5px;padding:11px 13px;border-radius:10px;margin-bottom:18px;display:none;line-height:1.45}
  .login-err.show{display:block;animation:rise .3s}
  .pass-wrap{position:relative}
  .pass-wrap input{padding-right:46px !important}
  .eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);width:30px;height:30px;
    display:grid;place-items:center;color:var(--text-faint);cursor:pointer;border-radius:8px;transition:.13s}
  .eye:hover{color:var(--text)}
  .forgot{text-align:right;margin-top:-8px;margin-bottom:16px}
  .forgot a{font-size:12px;color:var(--cyan)}
  .remember-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:-4px 0 16px;flex-wrap:wrap}
  .remember{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text-dim);cursor:pointer;user-select:none}
  .remember input{width:16px;height:16px;accent-color:var(--fire);cursor:pointer}
  .remember-row a{font-size:12px;color:var(--cyan)}

  /* SHELL */
  .shell{display:flex;min-height:100vh}
  .side{width:252px;flex-shrink:0;background:linear-gradient(180deg,var(--bg-2),#070B12);
    border-right:1px solid var(--line-soft);padding:24px 16px;display:flex;flex-direction:column;
    position:sticky;top:0;height:100vh}
  .side .orb-wrap{margin-bottom:32px;padding:0 6px}
  .nav{display:flex;flex-direction:column;gap:3px}
  .nav button{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:11px;
    font-size:14px;color:var(--text-dim);font-weight:500;text-align:left;width:100%;position:relative;
    overflow:hidden;transition:color .18s,background .18s,transform .18s cubic-bezier(.2,.9,.25,1)}
  .nav button:hover{background:var(--surface);color:var(--text);transform:translateX(4px)}
  .nav button.on{background:linear-gradient(135deg,var(--surface-2),#101826);color:var(--text)}
  .nav button.on::before{content:"";position:absolute;left:0;top:9px;bottom:9px;width:3px;border-radius:3px;
    background:linear-gradient(180deg,var(--fire),var(--fire-soft));box-shadow:0 0 12px var(--fire);
    animation:barpulse 2.4s ease-in-out infinite}
  @keyframes barpulse{0%,100%{box-shadow:0 0 8px var(--fire);opacity:.85}50%{box-shadow:0 0 18px var(--fire);opacity:1}}
  /* destello que cruza el botón al pasar el mouse */
  .nav button::after{content:"";position:absolute;top:0;bottom:0;left:-60%;width:45%;pointer-events:none;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.07),transparent);
    transform:skewX(-18deg);transition:none}
  .nav button:hover::after{animation:navsheen .65s ease}
  @keyframes navsheen{from{left:-60%}to{left:130%}}
  .ic{width:18px;height:18px;flex-shrink:0;color:var(--text-faint);
    transition:color .18s,transform .28s cubic-bezier(.2,.9,.25,1),filter .18s}
  .nav button.on .ic,.nav button:hover .ic{color:var(--fire-soft)}
  .nav button:hover .ic{transform:scale(1.18) rotate(-6deg);filter:drop-shadow(0 0 6px rgba(255,107,44,.55))}
  .nav button.on .ic{filter:drop-shadow(0 0 5px rgba(255,107,44,.45));animation:icfloat 3s ease-in-out infinite}
  @keyframes icfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
  @media(prefers-reduced-motion:reduce){
    .nav button,.nav button .ic,.nav button.on::before{animation:none!important;transition:none}
    .nav button:hover{transform:none}
  }
  .side-foot{margin-top:auto;padding-top:18px;border-top:1px solid var(--line-soft)}
  .side-user{display:flex;align-items:center;gap:11px;padding:8px;border-radius:11px}
  .avatar{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#1B2940,#0C1320);
    border:1px solid var(--line);display:grid;place-items:center;font-weight:700;font-size:13px;
    font-family:var(--display);color:var(--fire-soft);flex-shrink:0}
  .side-user .meta{min-width:0}
  .side-user .meta .n{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .side-user .meta .e{font-size:11px;color:var(--text-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .logout{margin-top:10px;width:100%;display:flex;align-items:center;gap:10px;padding:10px 13px;
    border-radius:11px;font-size:13px;color:var(--text-dim);transition:.15s}
  .logout:hover{background:rgba(255,77,94,.08);color:#FF8A95}

  .main{flex:1;padding:34px 40px 60px;min-width:0;animation:fadein .45s ease}
  @keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .page-head{margin-bottom:26px}
  .page-head h1{font-family:var(--display);font-size:28px;font-weight:600;letter-spacing:-.01em}
  .page-head p{color:var(--text-dim);font-size:14px;margin-top:5px}

  /* PRODUCT CARDS */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:18px}
  .card{background:linear-gradient(165deg,var(--surface),#0D1420);border:1px solid var(--line-soft);
    border-radius:18px;overflow:hidden;transition:border-color .2s,transform .2s,box-shadow .25s;
    display:flex;flex-direction:column;position:relative;animation:rise .5s ease backwards}
  .card:nth-child(2){animation-delay:.06s}.card:nth-child(3){animation-delay:.12s}.card:nth-child(4){animation-delay:.18s}
  .card:hover{border-color:rgba(255,107,44,.35);transform:translateY(-4px);
    box-shadow:0 24px 50px -24px rgba(255,107,44,.25),0 0 0 1px rgba(255,107,44,.12)}
  .card-top{padding:20px 20px 16px;border-bottom:1px solid var(--line-soft)}
  .card-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .card-name{font-family:var(--display);font-size:17px;font-weight:600;line-height:1.25}
  .card-cat{font-size:11px;color:var(--text-faint);letter-spacing:.05em;margin-top:4px;text-transform:uppercase}
  .pill{font-size:10px;font-weight:600;letter-spacing:.05em;padding:5px 10px;border-radius:20px;text-transform:uppercase;white-space:nowrap;flex-shrink:0;display:inline-flex;align-items:center;gap:6px}
  .pill .pdot{width:6px;height:6px;border-radius:50%}
  .pill.active{background:rgba(39,215,150,.12);color:var(--green);border:1px solid rgba(39,215,150,.28)}
  .pill.active .pdot{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
  .pill.pending{background:rgba(255,194,71,.12);color:var(--amber);border:1px solid rgba(255,194,71,.28)}
  .pill.pending .pdot{background:var(--amber)}
  .pill.locked{background:rgba(138,152,172,.1);color:var(--text-dim);border:1px solid var(--line)}
  .pill.locked .pdot{background:var(--text-faint)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .card-desc{font-size:13px;color:var(--text-dim);line-height:1.55;padding:14px 20px 0}
  /* progress bar (Lucid style) */
  .prog-wrap{padding:16px 20px 4px}
  .prog-top{display:flex;justify-content:space-between;font-size:11px;color:var(--text-faint);margin-bottom:7px;letter-spacing:.03em}
  .prog-top b{color:var(--text);font-family:var(--mono);font-weight:500}
  .prog-bar{height:6px;border-radius:6px;background:var(--bg-2);overflow:hidden;position:relative}
  .prog-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--fire),var(--fire-soft));
    box-shadow:0 0 12px rgba(255,107,44,.5);transform-origin:left;animation:grow 1s cubic-bezier(.2,.8,.2,1) backwards}
  .prog-fill.cyan{background:linear-gradient(90deg,var(--cyan),var(--cyan-soft));box-shadow:0 0 12px rgba(52,179,255,.5)}
  .prog-fill.green{background:linear-gradient(90deg,var(--green),#5DEBB4);box-shadow:0 0 12px rgba(39,215,150,.5)}
  @keyframes grow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
  .card-meta{padding:12px 20px;display:flex;gap:20px;flex-wrap:wrap}
  .meta-item{font-size:11px;color:var(--text-faint)}
  .meta-item b{display:block;font-family:var(--mono);font-size:12.5px;color:var(--text);margin-top:3px;font-weight:500}
  .card-actions{margin-top:auto;padding:16px 20px;display:flex;gap:10px;border-top:1px solid var(--line-soft)}
  .btn-dl{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:11px;
    font-size:13px;font-weight:600;background:linear-gradient(135deg,var(--fire),#E8551C);color:#0A0A0A;transition:.15s}
  .btn-dl:hover{filter:brightness(1.08);box-shadow:0 8px 22px -8px rgba(255,107,44,.6)}
  .btn-dl.disabled{background:var(--surface-2);color:var(--text-faint);border:1px solid var(--line);cursor:not-allowed;box-shadow:none}
  .btn-vid{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 16px;border-radius:11px;
    font-size:13px;font-weight:600;background:var(--surface-2);border:1px solid var(--line);color:var(--text);transition:.15s}
  .btn-vid:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:0 8px 22px -10px rgba(52,179,255,.5)}

  /* NEWS */
  .news-list{display:flex;flex-direction:column;gap:14px;max-width:740px}
  .news-item{background:linear-gradient(160deg,var(--surface),#0D1420);border:1px solid var(--line-soft);
    border-radius:15px;padding:20px 22px 20px 26px;position:relative;transition:.2s;animation:rise .5s ease backwards}
  .news-item:nth-child(2){animation-delay:.07s}.news-item:nth-child(3){animation-delay:.14s}
  .news-item:hover{border-color:var(--line);transform:translateX(3px)}
  .news-item::before{content:"";position:absolute;left:0;top:18px;bottom:18px;width:3px;border-radius:3px;
    background:var(--fire);box-shadow:0 0 12px var(--fire)}
  .news-item.cyan::before{background:var(--cyan);box-shadow:0 0 12px var(--cyan)}
  .news-item.green::before{background:var(--green);box-shadow:0 0 12px var(--green)}
  .news-date{font-family:var(--mono);font-size:11px;color:var(--text-faint);margin-bottom:8px;letter-spacing:.03em}
  .news-item h3{font-family:var(--display);font-size:16px;font-weight:600;margin-bottom:7px}
  .news-item p{font-size:13.5px;color:var(--text-dim);line-height:1.6}
  .news-tag{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;
    padding:3px 9px;border-radius:6px;margin-bottom:10px;background:rgba(255,107,44,.12);color:var(--fire-soft)}
  .news-tag.cyan{background:rgba(52,179,255,.12);color:var(--cyan)}
  .news-tag.green{background:rgba(39,215,150,.12);color:var(--green)}

  /* CONTACT */
  .contact-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;max-width:780px}
  .contact-card{background:linear-gradient(160deg,var(--surface),#0D1420);border:1px solid var(--line-soft);
    border-radius:15px;padding:24px;display:flex;flex-direction:column;gap:6px;transition:.2s;animation:rise .5s ease backwards}
  .contact-card:nth-child(2){animation-delay:.08s}.contact-card:nth-child(3){animation-delay:.16s}
  .contact-card:hover{border-color:var(--line);transform:translateY(-3px)}
  .contact-ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;margin-bottom:8px;
    background:var(--surface-2);border:1px solid var(--line)}
  .contact-card .lbl{font-size:11px;color:var(--text-faint);letter-spacing:.05em;text-transform:uppercase}
  .contact-card .val{font-family:var(--display);font-size:18px;font-weight:600}
  .contact-card .sub{font-size:12px;color:var(--text-dim)}

  /* ADMIN */
  .admin-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;gap:14px;flex-wrap:wrap}
  .search{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--line);
    border-radius:11px;padding:10px 13px;flex:1;max-width:330px}
  .search input{background:none;border:none;outline:none;color:var(--text);font-size:13px;width:100%}
  .search input::placeholder{color:var(--text-faint)}
  .btn-ghost{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:11px;
    background:var(--surface-2);border:1px solid var(--line);font-size:13px;font-weight:600;color:var(--text);transition:.15s}
  .btn-ghost:hover{border-color:var(--fire);color:var(--fire-soft)}
  .btn-add{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:11px;
    background:linear-gradient(135deg,var(--fire),#E8551C);color:#0A0A0A;font-size:13px;font-weight:600;transition:.15s}
  .btn-add:hover{filter:brightness(1.08);box-shadow:0 8px 22px -8px rgba(255,107,44,.6)}
  .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:26px}
  .stat{background:linear-gradient(160deg,var(--surface),#0D1420);border:1px solid var(--line-soft);
    border-radius:15px;padding:20px;position:relative;overflow:hidden;animation:rise .5s ease backwards}
  .stat:nth-child(2){animation-delay:.06s}.stat:nth-child(3){animation-delay:.12s}.stat:nth-child(4){animation-delay:.18s}
  .stat::after{content:"";position:absolute;top:-30px;right:-30px;width:80px;height:80px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,107,44,.10),transparent 70%)}
  .stat .v{font-family:var(--display);font-size:30px;font-weight:600;line-height:1}
  .statbtn{cursor:pointer;text-align:left;font-family:inherit;transition:.15s}
  .statbtn:hover{border-color:var(--amber,#F5A623);transform:translateY(-2px)}
  .statbtn.on{border-color:var(--amber,#F5A623);box-shadow:0 0 0 1px var(--amber,#F5A623) inset}
  .stat .l{font-size:12px;color:var(--text-dim);margin-top:8px}
  .stat .v.fire{color:var(--fire-soft)}.stat .v.green{color:var(--green)}.stat .v.amber{color:var(--amber)}.stat .v.cyan{color:var(--cyan)}
  .table{background:linear-gradient(160deg,var(--surface),#0D1420);border:1px solid var(--line-soft);border-radius:15px;overflow:hidden}
  .trow{display:grid;grid-template-columns:1.6fr 1.4fr 1fr 0.9fr auto;gap:14px;align-items:center;
    padding:15px 22px;border-bottom:1px solid var(--line-soft);font-size:13.5px}
  .trow:last-child{border-bottom:none}
  .trow.head{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-faint);font-weight:600;background:var(--bg-2)}
  .trow:not(.head):hover{background:var(--surface-2)}
  .cust-name{display:flex;align-items:center;gap:11px;min-width:0}
  .cust-name .n{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cust-email{font-family:var(--mono);font-size:12px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:7px}
  .dot.g{background:var(--green);box-shadow:0 0 8px var(--green)}
  .dot.a{background:var(--amber);box-shadow:0 0 8px var(--amber)}
  .dot.r{background:var(--red)}
  .row-act{display:flex;gap:7px;justify-content:flex-end}
  .ibtn{width:32px;height:32px;border-radius:9px;background:var(--surface-2);border:1px solid var(--line);
    display:grid;place-items:center;color:var(--text-dim);transition:.13s}
  .ibtn:hover{border-color:var(--fire);color:var(--fire-soft)}
  .ibtn.danger:hover{border-color:var(--red);color:var(--red)}

  /* MODAL */
  .modal-bg{position:fixed;inset:0;background:rgba(4,7,12,.8);backdrop-filter:blur(5px);z-index:200;
    display:none;align-items:center;justify-content:center;padding:24px}
  .modal-bg.show{display:flex;animation:fadein .2s}
  .modal{background:linear-gradient(165deg,var(--surface),#0D1420);border:1px solid var(--line);border-radius:18px;
    width:100%;max-width:560px;max-height:calc(100vh - 48px);display:flex;flex-direction:column;
    overflow:hidden;box-shadow:0 50px 110px -30px rgba(0,0,0,.9);animation:rise .3s}
  .modal-head{padding:20px 24px;border-bottom:1px solid var(--line-soft);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
  .modal-head h3{font-family:var(--display);font-size:17px;font-weight:600}
  .modal-x{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;color:var(--text-dim);transition:.13s}
  .modal-x:hover{background:var(--surface-2);color:var(--text)}
  .modal-body{padding:24px;overflow-y:auto;flex:1;min-height:0}
  .video-frame{aspect-ratio:16/9;background:radial-gradient(circle at 50% 40%,#0E1726,#000);border-radius:13px;
    border:1px solid var(--line);display:grid;place-items:center;position:relative;overflow:hidden}
  .video-frame .play{width:66px;height:66px;border-radius:50%;background:rgba(255,107,44,.95);display:grid;place-items:center;
    box-shadow:0 0 50px rgba(255,107,44,.55);transition:.2s;cursor:pointer}
  .video-frame .play:hover{transform:scale(1.08)}
  .video-frame .hint{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-size:12px;color:var(--text-dim)}
  .modal-steps{margin-top:20px;display:flex;flex-direction:column;gap:11px}
  .mstep{display:flex;gap:13px;align-items:flex-start}
  .mstep .num{width:24px;height:24px;border-radius:8px;background:var(--surface-2);border:1px solid var(--line);
    display:grid;place-items:center;font-family:var(--mono);font-size:12px;color:var(--fire-soft);flex-shrink:0;font-weight:700}
  .mstep p{font-size:13.5px;color:var(--text-dim);line-height:1.5;padding-top:2px}
  .mfield{margin-bottom:16px}
  .mfield label{display:block;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--text-dim);font-weight:600;margin-bottom:7px}
  .mfield input,.mfield textarea,.mfield select{width:100%;background:var(--bg-2);border:1px solid var(--line);
    border-radius:11px;padding:12px 13px;color:var(--text);font-size:13.5px;font-family:var(--body)}
  .mfield input:focus,.mfield textarea:focus,.mfield select:focus{outline:none;border-color:var(--fire)}
  .mfield textarea{resize:vertical;min-height:80px}
  .modal-foot{padding:18px 24px;border-top:1px solid var(--line-soft);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0}

  @media(max-width:860px){
    .side{position:fixed;left:-262px;transition:left .2s;z-index:60;box-shadow:20px 0 60px rgba(0,0,0,.6)}
    .side.open{left:0}
    .main{padding:24px 18px 50px}
    .trow{grid-template-columns:1.4fr auto;gap:10px}
    .trow .col-hide{display:none}
    .menu-btn{display:grid !important}
  }
  .menu-btn{display:none;position:fixed;top:14px;left:14px;z-index:55;width:42px;height:42px;
    border-radius:12px;background:var(--surface);border:1px solid var(--line);place-items:center;color:var(--text)}
  .info-btn{position:fixed;top:16px;right:18px;z-index:56;width:42px;height:42px;border-radius:12px;
    background:var(--surface);border:1px solid var(--line);display:grid;place-items:center;color:var(--text-dim);
    transition:.15s;box-shadow:0 6px 18px -8px rgba(0,0,0,.5)}
  .info-btn:hover{border-color:var(--fire);color:var(--fire-soft)}
  .info-sec{margin-bottom:20px}
  .info-sec h4{font-family:var(--display);font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--fire-soft);margin-bottom:8px}
  .info-sec p{font-size:13.5px;color:var(--text-dim);line-height:1.6}
  .info-plat{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
  .info-chip{font-size:12px;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:6px 11px;color:var(--text)}
  .info-contact{display:flex;flex-direction:column;gap:9px;margin-top:4px}
  .info-contact a{display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--text);padding:9px 12px;
    background:var(--bg-2);border:1px solid var(--line-soft);border-radius:10px;transition:.13s}
  .info-contact a:hover{border-color:var(--line)}
  /* empty states (admin sections to fill later) */
  .empty-state{text-align:center;padding:70px 24px;max-width:460px;margin:0 auto}
  .empty-ic{width:66px;height:66px;border-radius:18px;margin:0 auto 18px;display:grid;place-items:center;
    background:var(--surface);border:1px solid var(--line);color:var(--fire-soft)}
  .empty-state h3{font-family:var(--display);font-size:18px;margin-bottom:8px;color:var(--text)}
  .empty-state p{color:var(--text-dim);font-size:14px;line-height:1.5}
  /* disclaimer footer */
  .disclaimer{margin:46px auto 0;padding:22px 4px 0;border-top:1px solid var(--line-soft);max-width:880px}
  .disclaimer p{font-size:11.5px;color:var(--text-faint);line-height:1.65}
  .disclaimer .copy{margin-top:10px;opacity:.75}
  .login-col{display:flex;flex-direction:column;align-items:center;gap:14px;width:100%;max-width:430px}
  .login-col .disclaimer{margin:6px 0 0;border:none;padding:0 14px;text-align:center}
  .login-col .disclaimer p{font-size:10.5px}
  /* FAQ accordion */
  .faq-list{display:flex;flex-direction:column;gap:10px;max-width:720px}
  .faq-item{background:var(--surface);border:1px solid var(--line-soft);border-radius:13px;overflow:hidden;cursor:pointer;transition:border-color .15s}
  .faq-item:hover{border-color:var(--line)}
  .faq-q{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:16px 18px;font-weight:600;font-size:14.5px}
  .faq-arrow{color:var(--fire-soft);transition:transform .2s;flex-shrink:0}
  .faq-item.open .faq-arrow{transform:rotate(180deg)}
  .faq-a{max-height:0;overflow:hidden;padding:0 18px;color:var(--text-dim);font-size:13.5px;line-height:1.6;transition:max-height .25s,padding .25s}
  .faq-item.open .faq-a{max-height:240px;padding:0 18px 16px}
  /* segmented buttons (product access type) */
  .seg-btn{flex:1;padding:11px;border-radius:10px;background:var(--bg-2);border:1px solid var(--line);
    color:var(--text-dim);font-size:13px;font-weight:600;transition:.15s;cursor:pointer}
  .seg-btn.on{background:rgba(255,107,44,.12);border-color:var(--fire);color:var(--fire-soft)}
  /* access checkboxes */
  .acc-row{display:flex;align-items:center;gap:11px;padding:11px 13px;border:1px solid var(--line-soft);
    border-radius:10px;cursor:pointer;font-size:13.5px;transition:.13s}
  .acc-row:hover{border-color:var(--line);background:var(--surface-2)}
  .acc-row input{width:18px;height:18px;accent-color:var(--fire);cursor:pointer}
  /* PC picker */
  .pcs-pick{display:flex;gap:8px}
  .pcs-opt{flex:1;padding:13px 0;border-radius:11px;background:var(--bg-2);border:1px solid var(--line);
    color:var(--text);font-weight:700;font-family:var(--display);font-size:16px;cursor:pointer;transition:.13s}
  .pcs-opt:hover{border-color:var(--fire)}
  .pcs-opt.on{background:rgba(255,107,44,.14);border-color:var(--fire);color:var(--fire-soft)}
  /* language toggle */
  .lang-toggle{display:flex;gap:0;align-self:center;margin-bottom:18px;background:var(--surface);
    border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .lang-toggle button{padding:7px 16px;background:transparent;border:none;color:var(--text-dim);
    font-size:12.5px;font-weight:700;font-family:var(--display);letter-spacing:.04em;cursor:pointer;transition:.13s}
  .lang-toggle button.on{background:var(--fire);color:#0a0a0a}
  /* product view toggle */
  .view-toggle{display:flex;gap:0;background:var(--surface);border:1px solid var(--line);border-radius:10px;overflow:hidden;height:fit-content}
  .view-toggle button{padding:8px 12px;background:transparent;border:none;color:var(--text-dim);cursor:pointer;display:grid;place-items:center;transition:.13s}
  .view-toggle button.on{background:var(--fire);color:#0a0a0a}
  /* discounts */
  .disc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
  .disc-card{background:linear-gradient(160deg,var(--surface),#0D1420);border:1px solid var(--line);
    border-radius:16px;padding:18px;display:flex;flex-direction:column;gap:12px;transition:.15s}
  .disc-card:hover{border-color:var(--fire);transform:translateY(-2px)}
  .disc-top{display:flex;align-items:center;gap:12px}
  .disc-logo{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--fire),#E8541A);
    display:grid;place-items:center;font-family:var(--display);font-weight:800;font-size:19px;color:#0a0a0a;flex-shrink:0}
  .disc-empresa{font-family:var(--display);font-size:16px;font-weight:600;color:var(--text)}
  .disc-nota{font-size:11.5px;color:var(--text-faint);margin-top:2px;line-height:1.35}
  .disc-off{font-family:var(--display);font-size:20px;font-weight:800;color:var(--green);flex-shrink:0}
  .disc-code-row{display:flex;align-items:center;gap:8px;background:var(--bg-2);border:1px dashed var(--line-strong);
    border-radius:10px;padding:10px 12px}
  .disc-code{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--fire-soft);letter-spacing:.05em;flex:1}
  .disc-copy{display:inline-flex;align-items:center;gap:5px;background:var(--surface-2);border:1px solid var(--line);
    color:var(--text);border-radius:8px;padding:6px 11px;font-size:12px;font-weight:600;cursor:pointer;transition:.13s}
  .disc-copy:hover{border-color:var(--fire);color:var(--fire-soft)}
  .disc-go{display:flex;align-items:center;justify-content:center;gap:6px;background:var(--fire);color:#0a0a0a;
    border-radius:10px;padding:11px;font-size:13.5px;font-weight:700;text-decoration:none;transition:.13s}
  .disc-go:hover{background:var(--fire-soft)}
  /* layout 2 columnas equilibrado */
  .two-col{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(0,.95fr);gap:20px;align-items:start;max-width:1000px}
  .col-stack{display:flex;flex-direction:column;gap:18px}
  .contact-side{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-content:start}
  .contact-side .contact-card:last-child{grid-column:1 / -1}
  @media(max-width:900px){.two-col{grid-template-columns:1fr}.contact-side{grid-template-columns:1fr}}
  .ref-share{display:flex;gap:8px;margin-top:12px}
  .ref-sh{flex:1;text-align:center;padding:9px;border-radius:9px;font-size:12.5px;font-weight:700;text-decoration:none;transition:.13s}
  .ref-sh.wa{background:rgba(37,211,102,.12);color:#25D366;border:1px solid rgba(37,211,102,.3)}
  .ref-sh.wa:hover{background:rgba(37,211,102,.2)}
  .ref-sh.tg{background:rgba(52,179,255,.12);color:var(--cyan);border:1px solid rgba(52,179,255,.3)}
  .ref-sh.tg:hover{background:rgba(52,179,255,.2)}
  /* centro de ayuda */
  .help-quick{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;max-width:860px;margin-bottom:22px}
  .hq{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);
    border-radius:13px;padding:14px 15px;cursor:pointer;transition:.14s;color:var(--fire)}
  .hq:hover{border-color:var(--fire);transform:translateY(-2px)}
  .hq div{display:flex;flex-direction:column;min-width:0}
  .hq b{font-size:13.5px;color:var(--text);font-weight:600}
  .hq span{font-size:11px;color:var(--text-faint);margin-top:1px}
  .faq-cats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .faq-chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);
    color:var(--text-dim);border-radius:20px;padding:7px 13px;font-size:12.5px;font-weight:600;cursor:pointer;
    font-family:var(--body);transition:.13s}
  .faq-chip:hover{border-color:var(--line-strong);color:var(--text)}
  .faq-chip.on{background:var(--fire);border-color:var(--fire);color:#0a0a0a}
  .faq-count{background:rgba(255,255,255,.1);border-radius:9px;padding:1px 6px;font-size:10.5px}
  .faq-chip.on .faq-count{background:rgba(0,0,0,.18)}
  .faq-sec{font-family:var(--display);font-size:12px;font-weight:700;color:var(--fire-soft);text-transform:uppercase;
    letter-spacing:.07em;margin:22px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--line-soft)}
  .faq-sec:first-child{margin-top:0}

  .inst-step{display:flex;gap:14px;align-items:flex-start;background:var(--surface);border:1px solid var(--line-soft);border-radius:13px;padding:16px 18px}
  .inst-num{width:30px;height:30px;border-radius:9px;flex-shrink:0;display:grid;place-items:center;font-family:var(--display);font-weight:700;font-size:14px;
    background:linear-gradient(135deg,var(--fire),#E8551C);color:#0A0A0A}
  .inst-step h4{font-family:var(--display);font-size:14.5px;font-weight:600;margin-bottom:4px}
  .inst-step p{font-size:13px;color:var(--text-dim);line-height:1.55}
  /* admin messages */
  .msg-list{display:flex;flex-direction:column;gap:14px;max-width:760px}
  .msg-card{background:var(--surface);border:1px solid var(--line-soft);border-radius:14px;padding:18px 20px;transition:border-color .15s}
  .msg-card:hover{border-color:var(--line)}
  .msg-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .msg-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .msg-email{font-family:var(--mono);font-size:11.5px;color:var(--text-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .msg-date{font-family:var(--mono);font-size:11px;color:var(--text-faint);flex-shrink:0}
  .msg-body{font-size:13.5px;color:var(--text-dim);line-height:1.6;background:var(--bg-2);border-radius:10px;padding:13px 15px;margin-bottom:13px;white-space:pre-wrap}
  .msg-actions{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
  /* market news */
  .mkt-list{display:flex;flex-direction:column;gap:8px}
  .mkt-item{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line-soft);
    border-radius:12px;padding:13px 15px;transition:.15s;color:var(--text)}
  .mkt-item:hover{border-color:var(--cyan);transform:translateX(2px)}
  .mkt-item .ic{color:var(--text-faint);flex-shrink:0}
  .mkt-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);flex-shrink:0;animation:pulse 2s infinite}
  .mkt-title{font-size:13px;font-weight:500;line-height:1.4;flex:1}
  .mkt-date{font-size:11px;color:var(--text-faint);margin-top:3px}
</style>

function trustBar(){
  const isEn=LANG==='en';
  const rs=REVIEWS||[];
  const nRes=rs.length;
  const avg=nRes?(rs.reduce((s,r)=>s+(r.estrellas||0),0)/nRes):0;
  // clientes: tu override si lo pusiste, si no el conteo real del servidor, si no el respaldo
  const cli = (SRV_STATS&&SRV_STATS.clientes) ? SRV_STATS.clientes
            : (SRV_STATS&&SRV_STATS.reales!=null&&SRV_STATS.reales>0) ? (SRV_STATS.reales+'')
            : (STATS.clientes||'—');
  const anios = (SRV_STATS&&SRV_STATS.anios) ? SRV_STATS.anios : STATS.anios;
  const prods = (SRV_STATS&&SRV_STATS.productos) ? SRV_STATS.productos : STATS.productos;
  const stats=[
    {v:cli, l:isEn?'Active traders':'Traders activos', ic:I.users},

function sniperBG(){
  let candles='';
  const cols=22, base=170;
  for(let i=0;i<cols;i++){
    const x=i*(680/cols)+8;
    const up=Math.random()>0.48;
    const h=18+Math.random()*70;
    const y=base-Math.random()*90;
    const wick=8+Math.random()*10;
    const col=up?'#1f9d6b':'#c0392b';
    const dur=(5+Math.random()*4).toFixed(1);
    const delay=(Math.random()*4).toFixed(1);
    candles+=`<g opacity="0.55" style="animation:candleFloat ${dur}s ease-in-out ${delay}s infinite">
      <line x1="${x+5}" y1="${y-wick}" x2="${x+5}" y2="${y+h+wick}" stroke="${col}" stroke-width="1.2"/>
      <rect x="${x}" y="${y}" width="10" height="${h}" rx="1.5" fill="${col}"/></g>`;
  }
  const emblem=`<svg class="corner-emblem" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
      <circle cx="60" cy="60" r="42" fill="none" stroke="#FF6B2C" stroke-width="3"/>
      <line x1="60" y1="8" x2="60" y2="32" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <line x1="60" y1="88" x2="60" y2="112" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <line x1="8" y1="60" x2="32" y2="60" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <line x1="88" y1="60" x2="112" y2="60" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <circle cx="60" cy="60" r="20" fill="none" stroke="#fff" stroke-width="2.5"/>
      <ellipse cx="60" cy="60" rx="7" ry="12" fill="#FF6B2C"/>
      <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="30s" repeatCount="indefinite"/>
    </svg>`;
  return `<div class="sniper-bg" aria-hidden="true">
    <svg class="candles-svg" viewBox="0 0 680 220" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg">${candles}</svg>
    <div class="emblem-wrap">${emblem}</div>
  </div>`;
}

  if(!email||!pass){authMsg='Escribe tu correo y contraseña.';return render();}

function mktDate(s){
  if(!s)return'';
  try{const d=new Date(s);if(isNaN(d))return'';
    const diff=(Date.now()-d.getTime())/3600000;
    if(diff<1)return'hace minutos';
    if(diff<24)return'hace '+Math.floor(diff)+' h';
    const dias=Math.floor(diff/24); if(dias===1)return'ayer';
    if(dias<7)return'hace '+dias+' días';
    return d.toLocaleDateString('es',{day:'numeric',month:'short'});
  }catch(e){return''}
}

async function sendContact(){
  const m=(document.getElementById('cmsg').value||'').trim();
  const tel=(document.getElementById('ctel')?document.getElementById('ctel').value:'').trim();
  if(!m){contactDone='ERR';return render();}
  CONTACT_TEL=tel;
  try{ if(tel) localStorage.setItem('sp_tel',tel); }catch(e){}
  if(!API_URL){contactDone='OK';return render();}
  const btn=document.getElementById('cbtn');btn.textContent=t('enviando_msg');
  try{ const r=await apiCall({action:'contact',email:CLIENT.email,nombre:CLIENT.name,mensaje:m,telefono:tel});
    contactDone=r.ok?'OK':'ERR';render();
  }catch(e){contactDone='ERR';render();}
}

// ── MODO MANTENIMIENTO ──
let MAINT={on:false,msg:''}, MAINT_LOADED=false, MAINT_SAVING=false;
function maintTexto(){
  return MAINT.msg && MAINT.msg.trim()
    ? MAINT.msg.trim()
    : (LANG==='en'
        ? 'MAINTENANCE IN PROGRESS — I am updating the portal. Sorry for any error you may see.'
        : 'MANTENIMIENTO EN CURSO — Estoy actualizando el portal. Disculpa cualquier error que veas.');
}
function pintarMaint(){
  const bar=document.getElementById('maintBar'); if(!bar)return;
  if(!MAINT.on){ bar.classList.remove('show'); document.body.classList.remove('has-maint'); bar.innerHTML=''; return; }
  const txt=maintTexto();
  const tira=`<span class="maint-item">${sv(I.tool,15)} ${txt}</span>`;
  bar.innerHTML=`<div class="maint-track">${tira.repeat(6)}</div>`;
  bar.classList.add('show'); document.body.classList.add('has-maint');
}
async function loadMaint(){
  if(!API_URL)return;
  try{ const r=await apiCall({action:'getmaint'});
    if(r.ok){ MAINT={on:!!r.maint,msg:r.msg||''}; } }catch(e){}
  MAINT_LOADED=true; pintarMaint();
}
async function toggleMaint(){
  if(MAINT_SAVING)return; MAINT_SAVING=true;
  const nuevo=!MAINT.on;
  const el=document.getElementById('maintMsg');
  if(el)MAINT.msg=(el.value||'').trim();
  MAINT.on=nuevo; renderKeep(); pintarMaint();
  try{ await apiCall({action:'setmaint',email:SESS.email,pass:SESS.pass,on:nuevo?'SI':'NO',msg:MAINT.msg}); }catch(e){}
  MAINT_SAVING=false;
}
async function saveMaintMsg(){
  const el=document.getElementById('maintMsg'); if(!el)return;
  MAINT.msg=(el.value||'').trim();
  const b=document.getElementById('maintSave'); if(b)b.textContent='Guardado ✓';
  try{ await apiCall({action:'setmaint',email:SESS.email,pass:SESS.pass,on:MAINT.on?'SI':'NO',msg:MAINT.msg}); }catch(e){}
  pintarMaint();
  setTimeout(()=>{const x=document.getElementById('maintSave');if(x)x.textContent='Guardar aviso';},1400);
}
function statsCard(){
  if(view!=='admin')return '';
  if(SRV_STATS===null) loadStats();
  const reales=(SRV_STATS&&SRV_STATS.reales!=null)?SRV_STATS.reales:'—';
  const cli=(SRV_STATS&&SRV_STATS.clientes)||'';
  const an=(SRV_STATS&&SRV_STATS.anios)||'';
  const pr=(SRV_STATS&&SRV_STATS.productos)||'';
  return `<div class="card"><div class="card-top">
      <div class="card-name">${sv(I.users,16)} Barra de confianza</div>
      <div class="card-cat">Los números que salen en la portada</div></div>
    <div style="padding:20px">
      <div class="stat-real">${sv(I.check,13)} Tienes <b>${reales}</b> clientes aprobados reales.
        <span>Déjalo vacío abajo para mostrar ese número, o escribe el tuyo (ej. 250+).</span></div>
      <div class="mfield"><label>Traders activos</label>
        <input id="stCli" value="${cli.replace(/"/g,'&quot;')}" placeholder="Vacío = ${reales} (real)"></div>
      <div class="mfield"><label>Años en el mercado</label>
        <input id="stAn" value="${an.replace(/"/g,'&quot;')}" placeholder="Ej: 3+"></div>
      <div class="mfield"><label>Herramientas pro</label>
        <input id="stPr" value="${pr.replace(/"/g,'&quot;')}" placeholder="Ej: 6"></div>
      <button class="btn-add" id="stSave" style="padding:9px 16px" onclick="saveStats()">Guardar números</button>
      <div style="font-size:11px;color:var(--text-faint);margin-top:9px;line-height:1.5">⭐ La calificación de estrellas sale sola de tus reseñas, esa no se toca.</div>
    </div></div>`;
}
async function saveStats(){
  const clientes=(document.getElementById('stCli')||{}).value||'';
  const anios=(document.getElementById('stAn')||{}).value||'';
  const productos=(document.getElementById('stPr')||{}).value||'';
  const b=document.getElementById('stSave'); if(b)b.textContent='Guardando...';
  try{ await apiCall({action:'setstats',email:SESS.email,pass:SESS.pass,clientes,anios,productos}); }catch(e){}
  SRV_STATS=null;
  if(b)b.textContent='Guardado ✓';
  setTimeout(()=>{const x=document.getElementById('stSave');if(x)x.textContent='Guardar números';},1400);
  loadStats();
}

function toEmbed(url){
  if(!url) return '';
  let m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([\w-]{11})/);
  if(m) return 'https://www.youtube.com/embed/'+m[1];
  m=url.match(/drive\.google\.com\/file\/d\/([\w-]+)/);
  if(m) return 'https://drive.google.com/file/d/'+m[1]+'/preview';
  return url;
}

async function openGuide(g){
  const e=g||{id:'',titulo:'',descripcion:'',video:'',tipo:'PUBLICO',acceso:''};
  const tp=(e.tipo||'PUBLICO').toUpperCase();
  // asegurar lista de clientes cargada para poder elegir quién lo ve
  if(ADMIN_USERS===null){ try{const r=await apiCall({action:'listusers',email:SESS.email,pass:SESS.pass});ADMIN_USERS=r.ok?r.users:[];}catch(x){ADMIN_USERS=[];} }
  const permitidos=(e.acceso||'').split(',').map(x=>x.trim().toLowerCase()).filter(Boolean);
  const clientes=(ADMIN_USERS||[]).filter(c=>(c.rol||'').toUpperCase()!=='ADMIN');
  const listaCli = clientes.length ? clientes.map(c=>{
      const chk=permitidos.indexOf((c.email||'').toLowerCase())>=0?'checked':'';
      const apr=(c.aprobado||'').toUpperCase()==='SI';
      const busca=((c.nombre||'')+' '+(c.email||'')).toLowerCase().replace(/"/g,'');
      return `<label class="acc-row gacc-row" data-s="${busca}"><input type="checkbox" class="gacc" value="${c.email}" ${chk} onchange="gaccCount()">
        <span><b>${c.nombre||c.email}</b>${apr?'':' <span class="off-tag">pendiente</span>'}<br><span style="font-size:11px;color:var(--text-faint)">${c.email}</span></span></label>`;
    }).join('')
    : `<p style="color:var(--text-faint);font-size:12.5px;padding:6px 0">Aún no tienes clientes registrados.</p>`;
  document.getElementById('guideTitle').textContent = g?'Editar guía':'Añadir guía';
  document.getElementById('guideBody').innerHTML = `
    <input type="hidden" id="gid" value="${e.id}">
    <div class="mfield"><label>Título de la guía</label><input id="gtitulo" value="${(e.titulo||'').replace(/"/g,'&quot;')}" placeholder="Ej: Cómo instalar / Cómo activar licencia"></div>
    <div class="mfield"><label>Descripción (opcional)</label><textarea id="gdesc" placeholder="Breve explicación...">${e.descripcion||''}</textarea></div>
    <div class="mfield"><label>Link del video (YouTube oculto o Drive)</label><input id="gvideo" value="${(e.video||'').replace(/"/g,'&quot;')}" placeholder="https://youtu.be/..."></div>
    <div class="mfield"><label>¿Quién puede verlo?</label>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button type="button" id="btnGPub" class="seg-btn ${tp!=='PRIVADO'?'on':''}" onclick="setGuideTipo('PUBLICO')">👁️ Todos los clientes</button>
        <button type="button" id="btnGPriv" class="seg-btn ${tp==='PRIVADO'?'on':''}" onclick="setGuideTipo('PRIVADO')">🔒 Solo los que yo elija</button>
      </div></div>
    <input type="hidden" id="gtipo" value="${tp}">
    <div class="mfield" id="gAccField" style="display:${tp==='PRIVADO'?'block':'none'}">
      <label>Clientes con acceso <span style="color:var(--text-faint);font-weight:400">(marca los que sí)</span></label>
      <div class="gacc-bar">
        <div style="display:flex;gap:8px">
          <button type="button" class="btn-ghost" style="padding:5px 11px;font-size:12px" onclick="gaccAll(1)">Marcar todos</button>
          <button type="button" class="btn-ghost" style="padding:5px 11px;font-size:12px" onclick="gaccAll(0)">Quitar todos</button></div>
        <div class="gacc-search">${sv(I.search,14)}
          <input id="gaccQ" placeholder="Buscar cliente..." oninput="gaccFilter(this.value)" autocomplete="off"></div>
      </div>
      <div class="gacc-box" id="gaccBox">${listaCli}</div>
      <div class="gacc-info" id="gaccInfo"></div>
      <div style="font-size:11px;color:var(--text-faint);margin-top:7px;line-height:1.5">Los demás ni verán la guía en su lista. El link del video no se les manda.</div>
    </div>
    <div id="guideMsg"></div>`;
  document.getElementById('guideModal').classList.add('show');
  gaccCount();
}
function setGuideTipo(v){
  document.getElementById('gtipo').value=v;
  document.getElementById('btnGPub').classList.toggle('on',v!=='PRIVADO');
  document.getElementById('btnGPriv').classList.toggle('on',v==='PRIVADO');
  document.getElementById('gAccField').style.display=(v==='PRIVADO'?'block':'none');
  if(v==='PRIVADO')gaccCount();
}
function gaccFilter(q){
  q=(q||'').toLowerCase().trim();
  let vis=0;
  document.querySelectorAll('.gacc-row').forEach(r=>{
    const hit=!q||(r.dataset.s||'').indexOf(q)>=0;
    r.style.display=hit?'':'none';
    if(hit)vis++;
  });
  const box=document.getElementById('gaccBox');
  let none=document.getElementById('gaccNone');
  if(!vis){
    if(!none&&box){none=document.createElement('p');none.id='gaccNone';
      none.style.cssText='color:var(--text-faint);font-size:12.5px;padding:10px 6px;margin:0';
      none.textContent='Ningún cliente con ese nombre.';box.appendChild(none);}
  } else if(none){none.remove();}
  gaccCount();
}
function gaccAll(on){
  // solo los que se ven ahora (respeta la búsqueda)
  document.querySelectorAll('.gacc-row').forEach(r=>{
    if(r.style.display==='none')return;
    const c=r.querySelector('.gacc'); if(c)c.checked=!!on;
  });
  gaccCount();
}
function gaccCount(){
  const el=document.getElementById('gaccInfo'); if(!el)return;
  const n=document.querySelectorAll('.gacc:checked').length;
  const q=(document.getElementById('gaccQ')||{}).value||'';
  el.innerHTML=n?`<b>${n}</b> cliente${n===1?'':'s'} con acceso${q?' · los botones de arriba solo afectan lo que buscaste':''}`:'Ninguno marcado todavía';
  el.className='gacc-info'+(n?' on':'');
}
async function saveGuide(){
  const titulo=(document.getElementById('gtitulo').value||'').trim();
  if(!titulo){document.getElementById('guideMsg').innerHTML='<div class="login-err show">Ponle un título.</div>';return;}
  const tipo=document.getElementById('gtipo').value||'PUBLICO';
  const acceso=[...document.querySelectorAll('.gacc:checked')].map(c=>c.value).join(',');
  if(tipo==='PRIVADO' && !acceso){document.getElementById('guideMsg').innerHTML='<div class="login-err show">Marca al menos un cliente, o ponla como "Todos los clientes".</div>';return;}
  const data={action:document.getElementById('gid').value?'editguide':'addguide',
    email:SESS.email,pass:SESS.pass,gid:document.getElementById('gid').value,
    titulo, desc:document.getElementById('gdesc').value||'', video:document.getElementById('gvideo').value||'',
    tipo, acceso};
  try{ const r=await apiCall(data);
    if(r.ok){ closeModal('guideModal'); GUIDES=null; render(); }
    else document.getElementById('guideMsg').innerHTML='<div class="login-err show">No se pudo guardar.</div>';
  }catch(e){document.getElementById('guideMsg').innerHTML='<div class="login-err show">Error de conexión.</div>';}
}

  confirmAction('Borrar guía','¿Borrar la guía "'+titulo+'"?','Borrar',async()=>{
    try{ await apiCall({action:'deleteguide',email:SESS.email,pass:SESS.pass,gid:id}); GUIDES=null; render(); }catch(e){}
  });
}

let LIC_SEL=0, LIC_MODE='pending', ALL_LICS=null, ALL_LICS_LOADING=false;
async function licCall(url,params){
  const qs=Object.keys(params).map(k=>k+'='+encodeURIComponent(params[k])).join('&');
  const res=await fetch(url+'?'+qs); return await res.json();
}
async function loadAllData(silent){
  if(ALL_LICS_LOADING)return; ALL_LICS_LOADING=true;
  const results=await Promise.all(LICENSE_APIS.map(async(api)=>{
    if(!api.url||api.url.startsWith('PEGA_AQUI'))return {skip:true};
    try{ const r=await licCall(api.url,{action:'portal_list',padmin:SESS.email,ppass:SESS.pass});
      return r.ok ? {licencias:r.licencias} : {error:r.error||'ERR'}; }
    catch(e){ return {error:'CONN'}; }
  }));
  ALL_LICS=results; ALL_LICS_LOADING=false; silent?renderKeep():render();
}
function calcTotals(){
  let tot=0,apr=0,pend=0,conn=0;
  (ALL_LICS||[]).forEach(d=>{ if(d&&d.licencias){conn++;tot+=d.licencias.length;apr+=d.licencias.filter(l=>l.aprobado).length;pend+=d.licencias.filter(l=>!l.aprobado).length;} });
  return {tot,apr,pend,conn};
}
async function setLic(pi,hwid,valor,maxpcs){
  const api=LICENSE_APIS[pi];
  const d=ALL_LICS&&ALL_LICS[pi];
  const l=d&&d.licencias&&d.licencias.find(x=>x.hwid===hwid);
  if(l){ l.aprobado=(valor==='SI'); if(maxpcs)l.maxpcs=parseInt(maxpcs); renderKeep(); }
  const params={action:'portal_set',padmin:SESS.email,ppass:SESS.pass,hwid,valor};
  if(maxpcs)params.maxpcs=maxpcs;
  try{ await licCall(api.url,params); }catch(e){}
  loadAllData(true);
}
function approveLic(pi,hwid){
  const api=LICENSE_APIS[pi];
  if(api.pcs){ openPcs(pi,hwid); } else setLic(pi,hwid,'SI');
}

function delLic(pi,hwid){

function licRow(l,pi,cols){
  const hwid=(l.hwid||'').replace(/'/g,'');

    <button class="seg-btn ${LIC_MODE==='product'?'on':''}" onclick="LIC_MODE='product';render()">Por producto</button></div>`;
  const head=`<div class="page-head"><h1>Licencias</h1><p>Aprueba o quita licencias sin abrir la hoja.</p></div>${totals}`;

  // ── MODO PENDIENTES (todas juntas) ──
  if(LIC_MODE==='pending'){
    let pend=[];
    ALL_LICS.forEach((d,pi)=>{ if(d&&d.licencias){ d.licencias.filter(l=>!l.aprobado).forEach(l=>pend.push({l,pi})); } });
    const toolbar=`<div class="admin-toolbar">${modeToggle}<button class="btn-ghost" onclick="ALL_LICS=null;render()">${sv(I.refresh,15)} Actualizar</button></div>`;

        <div class="cust-email col-hide">${l.correo||'—'}</div>

    }).join('');
    return head+toolbar+`<div class="table"><div class="trow head" style="grid-template-columns:1.3fr 1.2fr 1fr auto">
      <div>Cliente</div><div class="col-hide">Correo</div><div class="col-hide">Producto</div><div style="text-align:right">Acción</div></div>${rows}</div>`;

  // ── MODO POR PRODUCTO ──

  const sel=`<select onchange="LIC_SEL=parseInt(this.value);render()" style="background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px 13px;color:var(--text);font-size:13.5px;font-family:var(--body)">
    ${apis.map((a,i)=>`<option value="${i}" ${i===LIC_SEL?'selected':''}>${a.name}</option>`).join('')}</select>`;
  const toolbar=`<div class="admin-toolbar"><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">${modeToggle}<span style="font-size:12px;color:var(--text-faint)">Producto:</span>${sel}</div>
    <button class="btn-ghost" onclick="ALL_LICS=null;render()">${sv(I.refresh,15)} Actualizar</button></div>`;
  const api=apis[LIC_SEL], d=ALL_LICS[LIC_SEL];
  if(!api.url||api.url.startsWith('PEGA_AQUI'))
    return head+toolbar+`<div class="empty-state"><div class="empty-ic">${sv(I.lock,28)}</div><h3>Falta conectar este producto</h3><p>Pega la URL del Apps Script de "${api.name}".</p></div>`;
  if(!d||d.error)
    return head+toolbar+`<div class="empty-state"><div class="empty-ic">${sv(I.lock,28)}</div><h3>${d&&d.error==='NO_ADMIN'?'Acceso no válido':'No se pudo conectar'}</h3><p>${d&&d.error==='NO_ADMIN'?'Revisa la contraseña del portal en el script (PORTAL_ADMIN_PASS).':'Verifica la URL y que el deploy esté como "Cualquiera".'}</p></div>`;
  const lics=d.licencias;
  const aprob=lics.filter(l=>l.aprobado).length, pend=lics.length-aprob;
  const rows=lics.length?lics.map(l=>{
    const r=licRow(l,LIC_SEL);
    return `<div class="trow" style="grid-template-columns:1.4fr 1.3fr 0.7fr 0.9fr auto">
      <div class="cust-name"><div class="avatar" style="width:30px;height:30px;font-size:11px">${r.init}</div>
        <div style="min-width:0"><div class="n">${l.nombre||'—'}</div><div class="cust-email">${l.correo||'—'}</div></div></div>
      <div class="cust-email col-hide">${l.correo||'—'}</div>
      <div class="col-hide" title="PCs/Usuarios"><span class="mono" style="font-size:12px">${r.pcsTxt}</span></div>
      <div class="col-hide">${r.badge}</div>
      <div class="row-act">${r.act}</div></div>`;
  }).join(''):`<div style="padding:40px;text-align:center;color:var(--text-faint)">Aún no hay solicitudes para este producto.</div>`;
  return head+toolbar+`<div class="stat-row">
      <div class="stat"><div class="v fire">${lics.length}</div><div class="l">Solicitudes</div></div>
      <div class="stat"><div class="v green">${aprob}</div><div class="l">Aprobadas</div></div>
      <div class="stat"><div class="v amber">${pend}</div><div class="l">Pendientes</div></div></div>
    <div class="table"><div class="trow head" style="grid-template-columns:1.4fr 1.3fr 0.7fr 0.9fr auto">
      <div>Cliente</div><div class="col-hide">Correo</div><div class="col-hide">PCs</div><div class="col-hide">Estado</div><div style="text-align:right">Acción</div></div>${rows}</div>`;
}

function render(){const app=document.getElementById('app');
  app.innerHTML = view==='login'?loginView():view==='admin'?adminView():clientView();
  pintarMaint();
  if(!MAINT_LOADED) loadMaint();
  if(view==='login'){ if(REVIEWS===null) loadReviews(); if(SRV_STATS===null) loadStats(); }
  setTimeout(updateScrollBtn,0);}
// revisa cada minuto por si activo el mantenimiento mientras el cliente está adentro
setInterval(()=>{ if(!MAINT_SAVING) loadMaint(); }, 60000);
restoreSession();
render();
</script>
</body>
</html>
